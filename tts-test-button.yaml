type: custom:mushroom-template-card
primary: TTS Test Button
secondary: Tap to test Sonos TTS (Volume 60%)
icon: mdi:test-tube
icon_color: green
tap_action:
  action: call-service
  service: media_player.play_media
  target:
    entity_id: media_player.living_room_beam
  data:
    announce: true
    media_content_id: >
      media-source://tts/google_translate_en_com?message=Hello, this is a test message from Home Assistant. The TTS is working correctly.
    media_content_type: music
    extra:
      volume: 60
